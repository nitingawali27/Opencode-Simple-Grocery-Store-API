# =============================================================================
# AZURE PIPELINES - Simple Grocery Store API Tests
# =============================================================================
# This pipeline has 7 stages:
#   Stage 1: Validate       - Check Python and project files exist
#   Stage 2: Install        - Install all dependencies
#   Stage 3: TestProducts   - Run product tests only
#   Stage 4: TestCart       - Run cart tests only
#   Stage 5: TestOrders     - Run order tests only
#   Stage 6: RunTestPlan    - Triggered by Azure Test Plans (Run Automated Tests)
#   Stage 7: Report         - Publish final HTML report
# =============================================================================

trigger:
  - main                          # Run pipeline when code is pushed to main branch

pool:
  vmImage: 'windows-latest'       # Use Windows machine to run the pipeline


stages:

# =============================================================================
# STAGE 1: VALIDATE
# Check that Python is available and project files exist
# =============================================================================
- stage: Validate
  displayName: 'Stage 1 - Validate Environment'
  jobs:
  - job: ValidateJob
    displayName: 'Check Python and Project Files'
    steps:

    - task: UsePythonVersion@0
      displayName: 'Set Python 3.12'
      inputs:
        versionSpec: '3.12'

    - script: python --version
      displayName: 'Print Python Version'

    - script: |
        echo Checking project files...
        if exist pytest-framework\requirements.txt (echo requirements.txt found) else (echo ERROR: requirements.txt missing && exit 1)
        if exist pytest-framework\config.py       (echo config.py found)          else (echo ERROR: config.py missing && exit 1)
        if exist pytest-framework\tests           (echo tests folder found)       else (echo ERROR: tests folder missing && exit 1)
      displayName: 'Check Required Files Exist'


# =============================================================================
# STAGE 2: INSTALL
# Install all Python packages from requirements.txt
# =============================================================================
- stage: Install
  displayName: 'Stage 2 - Install Dependencies'
  dependsOn: Validate               # Runs AFTER Validate
  jobs:
  - job: InstallJob
    displayName: 'Install Python Packages'
    steps:

    - task: UsePythonVersion@0
      displayName: 'Set Python 3.12'
      inputs:
        versionSpec: '3.12'

    - script: pip install -r pytest-framework/requirements.txt
      displayName: 'Install Requirements'

    - script: pip list
      displayName: 'Print Installed Packages'


# =============================================================================
# STAGE 3: TEST PRODUCTS
# Run only the product tests (test_products.py)
# =============================================================================
- stage: TestProducts
  displayName: 'Stage 3 - Test Products'
  dependsOn: Install                # Runs AFTER Install
  jobs:
  - job: ProductTestJob
    displayName: 'Run Product Tests'
    steps:

    - task: UsePythonVersion@0
      displayName: 'Set Python 3.12'
      inputs:
        versionSpec: '3.12'

    - script: pip install -r pytest-framework/requirements.txt
      displayName: 'Install Requirements'

    - script: |
        cd pytest-framework
        pytest tests/test_products.py -v --junitxml=results_products.xml
      displayName: 'Run test_products.py'

    - task: PublishTestResults@2
      displayName: 'Publish Product Test Results'
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'pytest-framework/results_products.xml'
        testRunTitle: 'Product Tests'
      condition: always()


# =============================================================================
# STAGE 4: TEST CART
# Run only the cart tests (test_cart.py)
# =============================================================================
- stage: TestCart
  displayName: 'Stage 4 - Test Cart'
  dependsOn: TestProducts           # Runs AFTER TestProducts
  jobs:
  - job: CartTestJob
    displayName: 'Run Cart Tests'
    steps:

    - task: UsePythonVersion@0
      displayName: 'Set Python 3.12'
      inputs:
        versionSpec: '3.12'

    - script: pip install -r pytest-framework/requirements.txt
      displayName: 'Install Requirements'

    - script: |
        cd pytest-framework
        pytest tests/test_cart.py -v --junitxml=results_cart.xml
      displayName: 'Run test_cart.py'

    - task: PublishTestResults@2
      displayName: 'Publish Cart Test Results'
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'pytest-framework/results_cart.xml'
        testRunTitle: 'Cart Tests'
      condition: always()


# =============================================================================
# STAGE 5: TEST ORDERS
# Run only the order tests (test_orders.py)
# =============================================================================
- stage: TestOrders
  displayName: 'Stage 5 - Test Orders'
  dependsOn: TestCart               # Runs AFTER TestCart
  jobs:
  - job: OrderTestJob
    displayName: 'Run Order Tests'
    steps:

    - task: UsePythonVersion@0
      displayName: 'Set Python 3.12'
      inputs:
        versionSpec: '3.12'

    - script: pip install -r pytest-framework/requirements.txt
      displayName: 'Install Requirements'

    - script: |
        cd pytest-framework
        pytest tests/test_orders.py -v --junitxml=results_orders.xml
      displayName: 'Run test_orders.py'

    - task: PublishTestResults@2
      displayName: 'Publish Order Test Results'
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'pytest-framework/results_orders.xml'
        testRunTitle: 'Order Tests'
      condition: always()


# =============================================================================
# STAGE 6: RUN TEST PLAN
# Triggered by Azure Test Plans "Run Automated Tests" OR manually.
# Runs all pytest tests and publishes results back to Test Plans via REST API.
#
# One-time setup required in Azure DevOps:
#   1. Pipelines > Environments > New Environment  ->  name it "TestEnvironment"
#   2. Pipeline settings > enable "Allow scripts to access the OAuth token"
#      (Edit pipeline > ... > Triggers > YAML > Agent job > tick the checkbox)
#   3. Add pipeline variable TEST_PLAN_ID = <your Test Plan ID number>
#      (find it in Test Plans URL: ?planId=123)
# =============================================================================
- stage: RunTestPlan
  displayName: 'Stage 6 - Run Azure Test Plan'
  dependsOn: Install                # Runs AFTER Install stage
  condition: always()               # Always available for Test Plans to trigger
  jobs:
  - deployment: TestPlanJob
    displayName: 'Run Automated Test Cases from Test Plan'
    environment: 'TestEnvironment'  # Must exist in Pipelines > Environments
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self           # Checkout the code first

          - task: UsePythonVersion@0
            displayName: 'Set Python 3.12'
            inputs:
              versionSpec: '3.12'

          - script: pip install -r pytest-framework/requirements.txt
            displayName: 'Install Requirements'

          - script: |
              cd pytest-framework
              pytest -v --junitxml=../results_testplan.xml
            displayName: 'Run All Pytest Tests'
            continueOnError: true   # Keep going so we always publish results

          # PublishTestResults links results to the pipeline build view
          - task: PublishTestResults@2
            displayName: 'Publish Results to Pipeline Build'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'results_testplan.xml'
              testRunTitle: 'Automated Test Plan Run'
              mergeTestResults: false
            condition: always()

          # publish_results.py creates a proper test run in Azure Test Plans
          # and uploads each pytest result so they appear under Test Plans > Runs
          - script: python pytest-framework/utils/publish_results.py
            displayName: 'Publish Results to Azure Test Plans (REST API)'
            condition: always()
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)
              JUNIT_XML_PATH: results_testplan.xml
              TEST_PLAN_ID: $(TEST_PLAN_ID)
              TEST_RUN_TITLE: 'Automated Pytest Run'


# =============================================================================
# STAGE 7: REPORT
# Generate and upload the final HTML report
# =============================================================================
- stage: Report
  displayName: 'Stage 7 - Publish Report'
  dependsOn: TestOrders             # Runs AFTER TestOrders
  condition: always()               # Always run even if tests failed
  jobs:
  - job: ReportJob
    displayName: 'Generate and Upload HTML Report'
    steps:

    - task: UsePythonVersion@0
      displayName: 'Set Python 3.12'
      inputs:
        versionSpec: '3.12'

    - script: pip install -r pytest-framework/requirements.txt
      displayName: 'Install Requirements'

    - script: |
        cd pytest-framework
        pytest -v --html=reports/test_report.html --self-contained-html
      displayName: 'Generate Full HTML Report'
      condition: always()

    - task: PublishBuildArtifacts@1
      displayName: 'Upload HTML Report'
      inputs:
        pathToPublish: 'pytest-framework/reports'
        artifactName: 'TestReport'
      condition: always()
